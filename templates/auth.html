<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniChecker - Plagiarism Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-body">
    <!-- Background Decoration -->
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="auth-container">
        <div class="auth-logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#logoGradientAuth)" stroke-width="2.5">
                <defs>
                    <linearGradient id="logoGradientAuth" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--primary-color);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--secondary-color);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            <h2>UniChecker</h2>
        </div>
        <div class="auth-card glass-panel">
            <h3>{{ 'Welcome Back' if is_login else 'Create an Account' }}</h3>
            <p class="auth-subtitle">Verify your documents with AI-powered checks.</p>

            {% if error %}
            <div class="alert error-alert">{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('login') if is_login else url_for('signup') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary w-100">{{ 'Login' if is_login else 'Sign Up' }}</button>
            </form>

            <div class="auth-switch">
                {% if is_login %}
                Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
                {% else %}
                Already have an account? <a href="{{ url_for('login') }}">Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</body>

</html>
