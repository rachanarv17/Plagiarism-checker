<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthentiCheck - Plagiarism Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <h2>AuthentiCheck</h2>
        </div>
        <div class="auth-card glass-panel">
            <h3>{{ 'Welcome Back' if is_login else 'Create an Account' }}</h3>
            <p class="auth-subtitle">Verify your documents with AI-powered checks.</p>

            {% if error %}
            <div class="alert error-alert">{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('login') if is_login else url_for('signup') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary w-100">{{ 'Login' if is_login else 'Sign Up' }}</button>
            </form>

            <div class="auth-switch">
                {% if is_login %}
                Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
                {% else %}
                Already have an account? <a href="{{ url_for('login') }}">Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</body>

</html>
